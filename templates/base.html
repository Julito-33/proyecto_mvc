{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Mi Sistema{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'accounts/css/dashboard.css' %}" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Mi Sistema</h2>
          <p>Panel de control</p>
        </div>

        <nav class="sidebar-nav">
          <a href="{% url 'home' %}" class="nav-item active">Inicio</a>
          <a href="#" class="nav-item">Usuarios</a>
          <a href="#" class="nav-item">Reportes</a>
          <a href="#" class="nav-item">Configuración</a>
          <a href="{% url 'logout' %}" class="nav-item logout">Cerrar sesión</a>
        </nav>
      </aside>

      <div class="main-content">
        <header class="topbar">
          <div>
            <h1>{% block page_title %}Dashboard{% endblock %}</h1>
            <p class="subtitle">Bienvenido al sistema</p>
          </div>

          <div class="user-box">
            <span class="user-label">Usuario activo</span>
            <strong>{{ request.user.username }}</strong>
          </div>
        </header>

        <main class="content-area">{% block content %}{% endblock %}</main>
      </div>
    </div>
  </body>
</html>
